<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#F1F5F9",
              "on-secondary-fixed": "#2E1065",
              "error": "#EF4444",
              "on-surface": "#334155",
              "surface-bright": "#FFFFFF",
              "primary-container": "#334155",
              "inverse-primary": "#94A3B8",
              "surface-container-lowest": "#FFFFFF",
              "surface-container-low": "#FAFAF9",
              "on-primary-container": "#E2E8F0",
              "surface-container-high": "#F1F5F9",
              "secondary-container": "#F3E8FF",
              "secondary": "#E9D5FF",
              "on-primary": "#FFFFFF",
              "primary": "#1E293B",
              "on-secondary-fixed-variant": "#581C87",
              "on-surface-variant": "#64748B",
              "on-primary-fixed": "#0F172A",
              "on-error-container": "#991B1B",
              "inverse-on-surface": "#F8FAFC",
              "tertiary-container": "#D1FAE5",
              "secondary-fixed": "#F3E8FF",
              "secondary-fixed-dim": "#E9D5FF",
              "error-container": "#FEE2E2",
              "on-primary-fixed-variant": "#334155",
              "tertiary-fixed": "#D1FAE5",
              "on-error": "#FFFFFF",
              "surface-variant": "#F1F5F9",
              "surface-container": "#F8FAFC",
              "outline-variant": "#CBD5E1",
              "outline": "#94A3B8",
              "on-tertiary-fixed": "#064E3B",
              "surface-tint": "#1E293B",
              "on-secondary": "#1E293B",
              "on-tertiary": "#064E3B",
              "on-secondary-container": "#581C87",
              "on-tertiary-container": "#065F46",
              "on-background": "#334155",
              "background": "#FAFAF9",
              "surface-container-highest": "#E2E8F0",
              "inverse-surface": "#1E293B",
              "tertiary": "#A7F3D0",
              "on-tertiary-fixed-variant": "#065F46",
              "primary-fixed-dim": "#CBD5E1",
              "tertiary-fixed-dim": "#A7F3D0",
              "primary-fixed": "#E2E8F0",
              "surface": "#FFFFFF"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "16px": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-blur-lavender {
            position: fixed;
            top: -10%;
            right: -5%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(233, 213, 255, 0.15) 0%, rgba(233, 213, 255, 0) 70%);
            filter: blur(80px);
            z-index: -1;
        }
        .glass-blur-mint {
            position: fixed;
            bottom: -10%;
            left: -5%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(167, 243, 208, 0.12) 0%, rgba(167, 243, 208, 0) 70%);
            filter: blur(80px);
            z-index: -1;
        }
        .logo-container {
            background-color: #1e293b;
        }
    </style>
</head>
<body class="bg-[#FAFAF9] text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Depth Elements -->
<div class="glass-blur-lavender"></div>
<div class="glass-blur-mint"></div>
<main class="w-full max-w-[480px] z-10">
<!-- Login Card -->
<div class="bg-surface rounded-16px p-10 md:p-12 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.05)] border border-white/50 relative">
<!-- Logo Header Centered in Card -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 mb-6 logo-container rounded-2xl flex items-center justify-center shadow-[0_12px_24px_-8px_rgba(30,41,59,0.3)] border border-primary/5 p-4 overflow-hidden">
<img alt="Pulse Logo" class="w-full h-full object-contain scale-125" src="https://lh3.googleusercontent.com/aida/ADBb0ujtH1xfO9qaLDg476U29T6VAGEuWDoVpIvBcbTPPmnEao8trXM8_H9i8gvVuczgZpkbWXWtgFX0WUFBxaaRFopjub1yApJ-Rekhc-pDT6wbhAOBfzSaJspfR9H6juGbvf1Vds028NDB0EEUGq-UgGMkhC7eRTzmt8OGgOrYFthP32-lHrN1ncHQQUDWXFIaUleTeipR9AyCuGbmwxLZPtYWjedZKgjr77jerA63OZl08p7Ou-wK-p_BAwObgCXUAjFH99s6Sr2lyA"/>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-primary mb-1">Bienvenido a Pulse</h1>
<p class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/70 font-semibold">Master Edition</p>
</div>
<div class="mb-8 text-center">
<p class="text-on-surface-variant text-sm leading-relaxed">Ingresa tus credenciales para acceder a tu entorno profesional de alta precisión.</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-headline text-[10px] uppercase tracking-widest text-on-surface-variant/80 font-bold block px-0.5">Correo Electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">mail</span>
</div>
<input class="w-full h-14 pl-11 pr-4 bg-surface-container-low border border-outline-variant/20 rounded-xl text-[14px] focus:ring-2 focus:ring-primary/5 focus:border-primary/40 outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-end px-0.5">
<label class="font-headline text-[10px] uppercase tracking-widest text-on-surface-variant/80 font-bold">Contraseña</label>
<a class="text-[11px] italic text-on-surface-variant/70 hover:text-primary transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">lock</span>
</div>
<input class="w-full h-14 pl-11 pr-11 bg-surface-container-low border border-outline-variant/20 rounded-xl text-[14px] focus:ring-2 focus:ring-primary/5 focus:border-primary/40 outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-0.5 py-1">
<input class="w-3.5 h-3.5 rounded border-outline-variant/40 text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="ml-2.5 text-[13px] text-on-surface-variant" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-surface font-headline text-sm font-semibold tracking-wide rounded-xl hover:bg-on-primary-fixed-variant active:scale-[0.99] transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/10 mt-6" type="submit">
<span>Iniciar Sesión</span>
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-[13px]">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Crear una ahora</a>
</p>
</div>
</div>
<!-- System Status / Support -->
<div class="mt-10 flex justify-between items-center px-6">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary shadow-[0_0_8px_rgba(167,243,208,0.8)]"></div>
<span class="text-[9px] font-headline uppercase tracking-[0.15em] text-on-surface-variant font-bold">Sistemas Operativos</span>
</div>
<div class="flex gap-6">
<a class="text-[9px] font-headline uppercase tracking-[0.15em] text-on-surface-variant font-bold hover:text-primary transition-colors" href="#">Soporte</a>
<a class="text-[9px] font-headline uppercase tracking-[0.15em] text-on-surface-variant font-bold hover:text-primary transition-colors" href="#">Privacidad</a>
</div>
</div>
</main>
<!-- Decorative Bottom Card (Visual Depth) -->
<div class="absolute bottom-[-150px] left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary/5 rounded-[200px] blur-[120px] -z-10 opacity-30"></div>
</body></html>
